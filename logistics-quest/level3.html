<!DOCTYPE html>
<html>
<head>

<body>

<div class="quest-box">

<h1>УРОВЕНЬ 3</h1>

<p>
Чтобы развивать локальный бренд,
нужно правильно выбрать район для склада
или пункта выдачи заказов.
</p>

<p>
Используйте сервис:
</p>

<p>
<a href="https://yandex.ru/geoanalytics/platform?layer=searches&category=orders_pickups_lockers&ll=60.641568%2C56.81901&z=11.05" target="_blank">
Открыть геоаналитику
</a>
</p>

<p>
Найдите район Екатеринбурга,
где высокая плотность населения
и активный пешеходный трафик.
</p>

<p class="hint">
Подсказка: самый молодой район города.
</p>

<input id="answer">

<br>

<button onclick="check()">Ответить</button>

</div>

<script>

function check(){

let a=document.getElementById("answer").value.toLowerCase();

if(a==="Академический"){
window.location.href="level4.html";
}else{
alert("Попробуйте другой район");
}

}

</script>
